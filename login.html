<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Doz T3ra9</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="container header-container">

    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Doz T3ra9 logo">
    </a>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
    </nav>

    <div class="header-actions">
      <a href="login.html" class="header-login">Login</a>
      <a href="index.html#contact" class="header-cta">Join</a>
    </div>

  </div>
</header>

<main>
  <section class="section">
    <div class="container">

      <div class="login-container">
        <form class="login-form reveal">
          <h2>Welcome Back</h2>

          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" required>

          <button type="submit" class="buy-btn">Login</button>

          <p id="error"></p>
        </form>
      </div>

    </div>
  </section>
</main>

<script src="login.js"></script>
</body>
</html>
